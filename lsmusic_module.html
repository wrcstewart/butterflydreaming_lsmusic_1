<script>
// ─── BD Parser ────────────────────────────────────────────────────────────────
// Parses a flat block of %%bd_ directives into a plain object.
function parseBDBlock(text) {
  const directives = {}
  const lines = text.split('\n')
  let state = 'text'
  let currentDirective = null
  let currentLines = []

  for (const line of lines) {
    if (state === 'text') {
      if (line.startsWith('%%bd_')) {
        const spaceIdx = line.indexOf(' ')
        if (spaceIdx === -1) continue
        const name = line.slice(5, spaceIdx)
        const value = line.slice(spaceIdx + 1).trim()
        if (value === '[') {
          currentDirective = name
          currentLines = []
          state = 'bracket'
        } else {
          directives[name] = value
        }
      }
    } else if (state === 'bracket') {
      if (line.trim() === '%%bd_]') {
        directives[currentDirective] = currentLines.join('\n')
        state = 'text'
      } else {
        currentLines.push(line)
      }
    }
  }
  return directives
}

// Splits script into {shared, voice1, voice2} sections then parses each.
// Scripts with no %%bd_voice marker are treated as single-voice (all → shared).
function parseBD(text) {
  const lines = text.split('\n')
  const buckets = { shared: [], voice1: [], voice2: [] }
  let current = 'shared'

  for (const line of lines) {
    if (line.startsWith('%%bd_voice ')) {
      current = line.slice(11).trim() === '2' ? 'voice2' : 'voice1'
    } else {
      buckets[current].push(line)
    }
  }

  return {
    shared: parseBDBlock(buckets.shared.join('\n')),
    voice1: parseBDBlock(buckets.voice1.join('\n')),
    voice2: parseBDBlock(buckets.voice2.join('\n'))
  }
}

// ─── Rules parser ──────────────────────────────────────────────────────────────
// Parses multi-line rules block. Each line: symbol=replacement
function parseRules(rulesText) {
  const productions = {}
  for (const line of rulesText.split('\n')) {
    const trimmed = line.trim()
    if (!trimmed || trimmed.startsWith('#')) continue
    const eqIdx = trimmed.indexOf('=')
    if (eqIdx < 1) continue
    const sym = trimmed.slice(0, eqIdx).trim()
    const rep = trimmed.slice(eqIdx + 1)
    productions[sym] = rep
  }
  return productions
}

// ─── Scales ────────────────────────────────────────────────────────────────────
const SCALES = {
  major:      [0, 2, 4, 5, 7, 9, 11],
  pentatonic: [0, 2, 4, 7, 9],
  blues:      [0, 3, 5, 6, 7, 10]
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

function pitchToMidi(noteName, octave) {
  const idx = NOTE_NAMES.indexOf(noteName)
  if (idx < 0) return 60
  return (octave + 1) * 12 + idx
}

function midiToPitch(midi) {
  const octave = Math.floor(midi / 12) - 1
  const idx = midi % 12
  return { note: NOTE_NAMES[idx], octave }
}

function mapYToPitch(y, yMin, yMax, scaleName, octaveCentre, midiMin=42, midiMax=64) {
  if (yMax === yMin) return `C${octaveCentre}`
  const yNorm = (y - yMin) / (yMax - yMin)  // [0, 1]
  const midiRaw = midiMin + yNorm * (midiMax - midiMin)
  const degrees = SCALES[scaleName] || SCALES.pentatonic
  let bestMidi = midiMin
  let minDist = Infinity
  for (let m = midiMin; m <= midiMax; m++) {
    if (degrees.includes(m % 12)) {
      const dist = Math.abs(midiRaw - m)
      if (dist < minDist) { minDist = dist; bestMidi = m }
    }
  }
  const { note, octave } = midiToPitch(bestMidi)
  return `${note}${octave}`
}

// ─── Turtle interpreter — per-step horizontal segment list (A5) ───────────────
// Returns [{y, consecutive}] for each horizontal F step.
// consecutive: true iff the run has not been broken since the last horizontal F.
// Only turns (+ or -) and vertical F steps break a run.
// Non-drawing symbols (X, Y, …), push ([), and pop (]) are transparent —
// they do not change the turtle heading so they cannot break a run.
function buildHorizontalSegments(lstring, angleDeg, fwdSym='F', leftSym='+', rightSym='-') {
  let x = 0, y = 0, angle = 0
  const stack = []
  const segs = []
  let prevHorizF = false

  for (const ch of lstring) {
    if (ch === fwdSym) {
      const rad = angle * Math.PI / 180
      const nx = x + Math.cos(rad)
      const ny = y + Math.sin(rad)
      const isHoriz = Math.abs(ny - y) < 0.001
      if (isHoriz) {
        segs.push({ y: (y + ny) / 2, consecutive: prevHorizF })
        prevHorizF = true
      } else {
        prevHorizF = false
      }
      x = nx; y = ny
    } else if (ch === leftSym) {
      angle += angleDeg; prevHorizF = false
    } else if (ch === rightSym) {
      angle -= angleDeg; prevHorizF = false
    } else if (ch === '[') {
      stack.push({ x, y, angle })
    } else if (ch === ']') {
      if (stack.length > 0) {
        const s = stack.pop(); x = s.x; y = s.y; angle = s.angle
      }
    }
    // All other symbols: transparent — prevHorizF unchanged
  }
  return segs
}

// ─── Build note array ──────────────────────────────────────────────────────────
// Returns [{ pitch: string, runLength: number }, ...]
// Run accumulation follows the A4 algorithm: advance i by run length each step.
function buildNotes(axiom, productions, depth, angleDeg, scaleName, octaveCentre, fwdSym='F', leftSym='+', rightSym='-', midiMin=42, midiMax=64) {
  const lsystem = new LSystem({ axiom, productions })
  lsystem.iterate(depth)
  const lstring = lsystem.getString()

  const segs = buildHorizontalSegments(lstring, angleDeg, fwdSym, leftSym, rightSym)
  if (segs.length === 0) return []

  const yMin = Math.min(...segs.map(s => s.y))
  const yMax = Math.max(...segs.map(s => s.y))

  const notes = []
  let i = 0
  while (i < segs.length) {
    let run = 1
    while (i + run < segs.length && segs[i + run].consecutive === true) run++
    const pitch = mapYToPitch(segs[i].y, yMin, yMax, scaleName, octaveCentre, midiMin, midiMax)
    notes.push({ pitch, runLength: run })
    i += run
  }

  return mergeConsecutivePitches(notes)
}

function mergeConsecutivePitches(notes) {
  if (notes.length === 0) return []
  const merged = []
  for (const note of notes) {
    if (merged.length > 0 && merged[merged.length - 1].pitch === note.pitch) {
      merged[merged.length - 1].runLength += note.runLength
    } else {
      merged.push({ ...note })
    }
  }
  return merged
}

// ─── ABC generation (internal, for Copy Music) ────────────────────────────────
function toneToABC(tonePitch) {
  const m = tonePitch.match(/^([A-G]#?)(\d)$/)
  if (!m) return 'z'
  const noteName = m[1]
  const oct = parseInt(m[2])
  const abcMap = {
    'C':'C','C#':'^C','D':'D','D#':'^D','E':'E','F':'F',
    'F#':'^F','G':'G','G#':'^G','A':'A','A#':'^A','B':'B'
  }
  let base = abcMap[noteName] || 'C'
  // ABC middle octave (no marker) = octave 4
  if (oct === 5) base = base.replace(/[A-G]/, c => c.toLowerCase())
  else if (oct === 3) base += ','
  else if (oct === 2) base += ',,'
  else if (oct === 6) base = base.replace(/[A-G]/, c => c.toLowerCase()) + "'"
  return base
}

function buildABC(notes, tempo, voiceNum=1) {
  let abc = `X:${voiceNum}\nT:L-System Fragment — Voice ${voiceNum}\nM:4/4\nL:1/8\nQ:1/8=${Math.round(tempo)}\nK:C\n`
  const BAR = 8
  let line = '|', units = 0, barCount = 0

  const flushBar = () => {
    line += '|'; barCount++
    if (barCount % 4 === 0) { abc += line + '\n'; line = '|' }
    units = 0
  }

  for (const note of notes) {
    const p = toneToABC(note.pitch)
    let rem = note.runLength
    while (rem > 0) {
      const space = BAR - units
      if (rem <= space) {
        line += p + (rem > 1 ? rem : '')
        units += rem; rem = 0
        if (units === BAR) flushBar()
      } else {
        // Tie across bar line
        line += p + (space > 1 ? space : '') + '-'
        rem -= space
        flushBar()
      }
    }
  }

  if (units > 0) {
    const fill = BAR - units
    if (fill > 0) line += fill > 1 ? `z${fill}` : 'z'
    line += '|'; abc += line + '\n'
  } else if (line !== '|') {
    abc += line + '\n'
  }
  return abc
}

// ─── Audio setup ──────────────────────────────────────────────────────────────
// Signal chain: Sampler → Chorus → Vibrato → Reverb → Destination
const reverb = new Tone.Reverb({ decay: 2.5, wet: 0.35 })
const vibrato = new Tone.Vibrato({ frequency: 5, depth: 0.2, type: 'sine' })
const chorus = new Tone.Chorus({ frequency: 1.5, delayTime: 3.5, depth: 0.4, wet: 0.3 })
chorus.start()

const INSTRUMENTS = {
  bass_recorder: {
    baseUrl: './bass-recorder/',
    urls: { 'F#2': 'bass_recorder_Fs2.mp3', 'C3': 'bass_recorder_C3.mp3', 'G#3': 'bass_recorder_Gs3.mp3', 'E4': 'bass_recorder_E4.mp3' },
    midiMin: 42,
    midiMax: 64
  },
  salamander_piano: {
    baseUrl: 'https://tonejs.github.io/audio/salamander/',
    urls: { 'A0': 'A0.mp3', 'C2': 'C2.mp3', 'A2': 'A2.mp3', 'C3': 'C3.mp3', 'A3': 'A3.mp3', 'C4': 'C4.mp3', 'A4': 'A4.mp3', 'C5': 'C5.mp3', 'A5': 'A5.mp3', 'C6': 'C6.mp3', 'A6': 'A6.mp3', 'C7': 'C7.mp3' },
    midiMin: 21,
    midiMax: 96
  }
}

chorus.connect(vibrato)
vibrato.connect(reverb)
reverb.toDestination()

let sampler = null
let sampler2 = null
let sampler1Ready = false
let sampler2Ready = false

async function onSamplerLoadComplete() {
  if (!sampler1Ready || !sampler2Ready) return
  try {
    await reverb.ready
    samplerReady = true
    setStatus(grammarReady ? 'Ready — press Play' : 'Samples loaded — awaiting script')
    updatePlayButton()
  } catch (e) {
    postError('Reverb initialisation failed: ' + e.message)
  }
}

function createSampler(voiceNum, instrumentName) {
  const instKey = INSTRUMENTS[instrumentName] ? instrumentName : 'bass_recorder'
  const inst = INSTRUMENTS[instKey]
  if (voiceNum === 1) {
    if (sampler) { try { sampler.disconnect(); sampler.dispose() } catch(e) {} }
    sampler1Ready = false
    samplerReady = false
    updatePlayButton()
    sampler = new Tone.Sampler({
      urls: inst.urls,
      baseUrl: inst.baseUrl,
      onload: () => { sampler1Ready = true; onSamplerLoadComplete() },
      onerror: (err) => postError('Voice 1 sample load failed: ' + err)
    })
    sampler.connect(chorus)
  } else {
    if (sampler2) { try { sampler2.disconnect(); sampler2.dispose() } catch(e) {} }
    sampler2Ready = false
    samplerReady = false
    updatePlayButton()
    sampler2 = new Tone.Sampler({
      urls: inst.urls,
      baseUrl: inst.baseUrl,
      onload: () => { sampler2Ready = true; onSamplerLoadComplete() },
      onerror: (err) => postError('Voice 2 sample load failed: ' + err)
    })
    sampler2.connect(chorus)
  }
}

// ─── State ────────────────────────────────────────────────────────────────────
let samplerReady = false
let grammarReady = false
let isPlaying = false
let restartTimeout = null
let paramsChanged = false
let currentNotes = []
let currentABC = ''
let currentNotes2 = []
let currentABC2 = ''
let hasVoice2 = false

let params = {
  axiom: 'F-F-F-F',
  rules: { F: 'F+FF-FF-F-F+F+FF-F+F-F-FF+FF+' },
  depth: 1,
  angle: 90,
  scale: 'pentatonic',
  tempo: 80,
  octaveCentre: 4,
  loop: true,
  loopGap: 4,
  reverbWet: 0.35,
  reverbDecay: 2.5,
  vibratoFreq: 5.0,
  vibratoDepth: 0.2,
  chorusWet: 0.3,
  chorusDepth: 0.4,
  instrument: 'bass_recorder'
}

let params2 = { axiom: '', rules: {}, depth: 1, angle: 90, scale: 'pentatonic', instrument: 'bass_recorder' }

// pending UI values (applied at next loop boundary)
let pending = Object.assign({}, params)
let pending2 = Object.assign({}, params2)

// ─── Status helpers ────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg
}

function postError(msg) {
  setStatus('Error: ' + msg)
  try { window.parent.postMessage({ type: 'BD_ERROR', payload: { message: msg } }, '*') } catch(e) {}
}

// ─── Compute notes from current grammar ───────────────────────────────────────
function recompute() {
  try {
    const inst1 = INSTRUMENTS[params.instrument] || INSTRUMENTS.bass_recorder
    currentNotes = buildNotes(
      params.axiom, params.rules, params.depth,
      params.angle, params.scale, params.octaveCentre,
      'F', '+', '-', inst1.midiMin, inst1.midiMax
    )
    if (currentNotes.length === 0) {
      postError('No horizontal segments found — no notes to play')
      grammarReady = false
      updatePlayButton()
      return false
    }
    currentABC = buildABC(currentNotes, params.tempo, 1)

    // Voice 2 — silent if axiom is empty
    currentNotes2 = []
    currentABC2 = ''
    if (hasVoice2 && params2.axiom) {
      const inst2 = INSTRUMENTS[params2.instrument] || INSTRUMENTS.bass_recorder
      currentNotes2 = buildNotes(
        params2.axiom, params2.rules, params2.depth,
        params2.angle, params2.scale, params.octaveCentre,
        'G', 'L', 'R', inst2.midiMin, inst2.midiMax
      )
      if (currentNotes2.length > 0) currentABC2 = buildABC(currentNotes2, params.tempo, 2)
    }

    grammarReady = true
    updatePlayButton()
    document.getElementById('copy-btn').disabled = false
    return true
  } catch (e) {
    postError('L-system error: ' + e.message)
    grammarReady = false
    updatePlayButton()
    return false
  }
}

// ─── Apply pending params to live effects ────────────────────────────────────
async function applyPending() {
  params = Object.assign({}, pending)
  // Depth and scale sliders override both voices (spec 9.4)
  params2 = Object.assign({}, pending2, { depth: params.depth, scale: params.scale })
  pending2.depth = params.depth
  pending2.scale = params.scale

  reverb.wet.value = params.reverbWet
  vibrato.frequency.value = params.vibratoFreq
  vibrato.depth.value = params.vibratoDepth
  chorus.wet.value = params.chorusWet
  chorus.depth = params.chorusDepth

  reverb.decay = params.reverbDecay
  await reverb.ready
}

// ─── ABC → schedule events (A2 Part B) ────────────────────────────────────────
// Parse the generated ABC string to derive pitch and duration for Tone.js.
// The ABC is the single source of truth; durations are not recalculated here.
// Format assumptions: L:1/8, Q:1/8=tempo, K:C, no key-sig accidentals,
// notes as [^_]?[A-Ga-g][,']*(n)? with ties (-) for bar-spanning runs.
function scheduleFromABC(abcText, tempo) {
  const secPerUnit = 60 / tempo  // one eighth-note (L:1/8, Q:1/8=tempo)
  const lines = abcText.split('\n')
  const bodyStart = lines.findIndex(l => l.startsWith('K:')) + 1
  if (bodyStart === 0) return null
  const body = lines.slice(bodyStart).join('\n')

  const events = []
  let t = 0
  const NOTE_RE = /(\^{1,2}|_{1,2}|=)?([A-Ga-gz])([,']*)(\d+)?(-)?/g
  let m
  while ((m = NOTE_RE.exec(body)) !== null) {
    const [, acc, letter, octMod, lenStr, tie] = m
    const len = lenStr ? parseInt(lenStr) : 1
    const durSec = len * secPerUnit

    if (letter === 'z' || letter === 'Z') { t += durSec; continue }

    let octave = (letter === letter.toUpperCase()) ? 4 : 5
    octave -= (octMod.match(/,/g) || []).length
    octave += (octMod.match(/'/g) || []).length

    const base = letter.toUpperCase()
    let noteName = acc === '^' ? base + '#' : acc === '_' ? base + 'b' : base
    const flatToSharp = { Cb:'B', Db:'C#', Eb:'D#', Fb:'E', Gb:'F#', Ab:'G#', Bb:'A#' }
    if (flatToSharp[noteName]) noteName = flatToSharp[noteName]

    if (tie && events.length > 0) {
      // Tie continuation: merge duration into the note this ties from
      events[events.length - 1].durSec += durSec
      t += durSec
      continue
    }

    events.push({ pitch: `${noteName}${octave}`, durSec, timeOffset: t })
    t += durSec
  }
  return events.length > 0 ? events : null
}

// ─── Scheduling & loop ────────────────────────────────────────────────────────
function scheduleAndPlay() {
  Tone.Transport.cancel()
  Tone.Transport.stop()
  Tone.Transport.position = 0

  // Voice 1
  let events1 = scheduleFromABC(currentABC, params.tempo)
  if (!events1) {
    const base = 60 / params.tempo
    let t = 0
    events1 = currentNotes.map(n => {
      const ev = { pitch: n.pitch, durSec: n.runLength * base, timeOffset: t }
      t += ev.durSec
      return ev
    })
  }
  events1.forEach(ev => {
    Tone.Transport.schedule((time) => {
      sampler.triggerAttackRelease(ev.pitch, ev.durSec * 0.92, time)
    }, ev.timeOffset)
  })
  const dur1 = events1.length > 0
    ? events1[events1.length - 1].timeOffset + events1[events1.length - 1].durSec
    : 0

  // Voice 2
  let dur2 = 0
  if (hasVoice2 && currentABC2) {
    let events2 = scheduleFromABC(currentABC2, params.tempo)
    if (!events2 && currentNotes2.length > 0) {
      const base = 60 / params.tempo
      let t = 0
      events2 = currentNotes2.map(n => {
        const ev = { pitch: n.pitch, durSec: n.runLength * base, timeOffset: t }
        t += ev.durSec
        return ev
      })
    }
    if (events2) {
      events2.forEach(ev => {
        Tone.Transport.schedule((time) => {
          sampler2.triggerAttackRelease(ev.pitch, ev.durSec * 0.92, time)
        }, ev.timeOffset)
      })
      dur2 = events2.length > 0
        ? events2[events2.length - 1].timeOffset + events2[events2.length - 1].durSec
        : 0
    }
  }

  const totalDurSec = Math.max(dur1, dur2)

  Tone.Transport.start()
  setStatus('Playing')

  if (params.loop) {
    restartTimeout = setTimeout(async () => {
      if (!isPlaying) return
      if (paramsChanged) {
        paramsChanged = false
        await applyPending()
        if (!recompute()) { isPlaying = false; updatePlayButton(); return }
      }
      scheduleAndPlay()
    }, (totalDurSec + params.loopGap) * 1000)
  } else {
    restartTimeout = setTimeout(() => {
      Tone.Transport.stop()
      setStatus('Finished')
      isPlaying = false
      updatePlayButton()
    }, totalDurSec * 1000 + 500)
  }
}

async function startPlay() {
  if (!samplerReady || !grammarReady) return
  // Resume AudioContext on user gesture
  await Tone.start()
  isPlaying = true
  updatePlayButton()
  paramsChanged = false
  await applyPending()
  if (!recompute()) { isPlaying = false; updatePlayButton(); return }
  scheduleAndPlay()
}

function stopPlay() {
  clearTimeout(restartTimeout)
  restartTimeout = null
  Tone.Transport.cancel()
  Tone.Transport.stop()
  Tone.Transport.position = 0
  isPlaying = false
  updatePlayButton()
  setStatus('Stopped')
}

function updatePlayButton() {
  document.getElementById('play-btn').disabled = !(samplerReady && grammarReady)
}

// ─── Reconstruct node text from current params ────────────────────────────────
function buildNodeText() {
  const g = id => document.getElementById(id)
  const depth        = g('depth-sel').value
  const scale        = g('scale-sel').value
  const tempo        = parseFloat(g('tempo-slider').value)
  const reverbWet    = parseFloat(g('reverb-wet').value)
  const reverbDecay  = parseFloat(g('reverb-decay').value)
  const vibratoFreq  = parseFloat(g('vibrato-freq').value)
  const vibratoDepth = parseFloat(g('vibrato-depth').value)
  const chorusWet    = parseFloat(g('chorus-wet').value)
  const chorusDepth  = parseFloat(g('chorus-depth').value)

  const sharedLines = [
    `%%bd_module lsmusic_module.html`,
    `%%bd_tempo ${tempo}`,
    `%%bd_octave_centre ${params.octaveCentre}`,
    `%%bd_loop ${params.loop}`,
    `%%bd_loop_gap ${params.loopGap}`,
    `%%bd_reverb_wet ${reverbWet.toFixed(2)}`,
    `%%bd_reverb_decay ${reverbDecay.toFixed(1)}`,
    `%%bd_vibrato_frequency ${vibratoFreq.toFixed(1)}`,
    `%%bd_vibrato_depth ${vibratoDepth.toFixed(2)}`,
    `%%bd_chorus_wet ${chorusWet.toFixed(2)}`,
    `%%bd_chorus_depth ${chorusDepth.toFixed(2)}`
  ]

  const v1Lines = [
    `%%bd_voice 1`,
    `%%bd_instrument ${params.instrument}`,
    `%%bd_scale ${scale}`,
    `%%bd_depth ${depth}`,
    `%%bd_angle ${params.angle}`,
    `%%bd_axiom ${g('axiom-input').value.trim()}`,
    `%%bd_rules [`,
    g('rules-area').value.trim(),
    `%%bd_]`
  ]

  if (!hasVoice2) {
    // Single-voice backwards-compat: inline voice 1 directives into shared block
    return [
      `%%bd_module lsmusic_module.html`,
      `%%bd_instrument ${params.instrument}`,
      `%%bd_axiom ${g('axiom-input').value.trim()}`,
      `%%bd_rules [`,
      g('rules-area').value.trim(),
      `%%bd_]`,
      `%%bd_depth ${depth}`,
      `%%bd_angle ${params.angle}`,
      `%%bd_scale ${scale}`,
      `%%bd_tempo ${tempo}`,
      `%%bd_octave_centre ${params.octaveCentre}`,
      `%%bd_loop ${params.loop}`,
      `%%bd_loop_gap ${params.loopGap}`,
      `%%bd_reverb_wet ${reverbWet.toFixed(2)}`,
      `%%bd_reverb_decay ${reverbDecay.toFixed(1)}`,
      `%%bd_vibrato_frequency ${vibratoFreq.toFixed(1)}`,
      `%%bd_vibrato_depth ${vibratoDepth.toFixed(2)}`,
      `%%bd_chorus_wet ${chorusWet.toFixed(2)}`,
      `%%bd_chorus_depth ${chorusDepth.toFixed(2)}`
    ].join('\n')
  }

  const v2Axiom = g('axiom-input-2').value.trim()
  const v2Rules = g('rules-area-2').value.trim()
  const v2Lines = [
    `%%bd_voice 2`,
    `%%bd_instrument ${params2.instrument}`,
    `%%bd_scale ${params2.scale}`,
    `%%bd_depth ${params2.depth}`,
    `%%bd_angle ${params2.angle}`,
    `%%bd_axiom ${v2Axiom}`,
    `%%bd_rules [`,
    v2Rules,
    `%%bd_]`
  ]

  return [...sharedLines, '', ...v1Lines, '', ...v2Lines].join('\n')
}

// ─── Apply BD_INIT directives to UI and params ────────────────────────────────
// parsed = { shared, voice1, voice2 } from parseBD()
function applyDirectives(parsed) {
  // Merge: shared provides defaults; voice1 overrides per-voice fields
  const d = Object.assign({}, parsed.shared, parsed.voice1)

  if (d.instrument !== undefined) {
    const instKey = INSTRUMENTS[d.instrument] ? d.instrument : 'bass_recorder'
    if (instKey !== params.instrument) {
      params.instrument = instKey; pending.instrument = instKey
      createSampler(1, instKey)
    }
  }
  if (d.axiom !== undefined) {
    params.axiom = d.axiom; pending.axiom = d.axiom
    document.getElementById('axiom-input').value = d.axiom
  }
  if (d.rules !== undefined) {
    const productions = parseRules(d.rules)
    params.rules = productions; pending.rules = productions
    document.getElementById('rules-area').value =
      Object.entries(productions).map(([s,r]) => `${s}=${r}`).join('\n')
  }
  if (d.depth !== undefined) {
    const v = Math.max(1, Math.min(5, parseInt(d.depth) || 4))
    params.depth = v; pending.depth = v
    document.getElementById('depth-sel').value = v
  }
  if (d.angle !== undefined) {
    params.angle = parseFloat(d.angle) || 90; pending.angle = params.angle
  }
  if (d.scale !== undefined && SCALES[d.scale]) {
    params.scale = d.scale; pending.scale = d.scale
    document.getElementById('scale-sel').value = d.scale
  }
  if (d.tempo !== undefined) {
    const v = Math.max(40, Math.min(160, parseFloat(d.tempo) || 80))
    params.tempo = v; pending.tempo = v
    document.getElementById('tempo-slider').value = v
    document.getElementById('tempo-val').textContent = Math.round(v) + ' BPM'
  }
  if (d.octave_centre !== undefined) {
    params.octaveCentre = parseInt(d.octave_centre) || 4
    pending.octaveCentre = params.octaveCentre
  }
  if (d.loop !== undefined) {
    params.loop = d.loop === 'true'; pending.loop = params.loop
  }
  if (d.loop_gap !== undefined) {
    params.loopGap = parseFloat(d.loop_gap) || 4; pending.loopGap = params.loopGap
  }
  const applySlider = (directive, paramKey, elId, valId, fmt) => {
    if (d[directive] !== undefined) {
      const v = parseFloat(d[directive])
      if (!isNaN(v)) {
        params[paramKey] = v; pending[paramKey] = v
        document.getElementById(elId).value = v
        document.getElementById(valId).textContent = fmt(v)
      }
    }
  }
  applySlider('reverb_wet',        'reverbWet',   'reverb-wet',   'reverb-wet-val',   v => v.toFixed(2))
  applySlider('reverb_decay',      'reverbDecay', 'reverb-decay', 'reverb-decay-val', v => v.toFixed(1) + 's')
  applySlider('vibrato_frequency', 'vibratoFreq', 'vibrato-freq', 'vibrato-freq-val', v => v.toFixed(1) + ' Hz')
  applySlider('vibrato_depth',     'vibratoDepth','vibrato-depth','vibrato-depth-val',v => v.toFixed(2))
  applySlider('chorus_wet',        'chorusWet',   'chorus-wet',   'chorus-wet-val',   v => v.toFixed(2))
  applySlider('chorus_depth',      'chorusDepth', 'chorus-depth', 'chorus-depth-val', v => v.toFixed(2))

  // Voice 2
  const v2 = parsed.voice2
  hasVoice2 = v2.axiom !== undefined && v2.axiom.trim() !== ''
  if (hasVoice2) {
    params2.axiom = v2.axiom.trim(); pending2.axiom = params2.axiom
    document.getElementById('axiom-input-2').value = params2.axiom
    if (v2.rules !== undefined) {
      params2.rules = parseRules(v2.rules); pending2.rules = params2.rules
      document.getElementById('rules-area-2').value =
        Object.entries(params2.rules).map(([s,r]) => `${s}=${r}`).join('\n')
    }
    if (v2.depth !== undefined) {
      params2.depth = Math.max(1, Math.min(5, parseInt(v2.depth) || 4))
      pending2.depth = params2.depth
    }
    if (v2.angle !== undefined) {
      params2.angle = parseFloat(v2.angle) || 90; pending2.angle = params2.angle
    }
    if (v2.scale !== undefined && SCALES[v2.scale]) {
      params2.scale = v2.scale; pending2.scale = v2.scale
    }
    if (v2.instrument !== undefined) {
      const instKey = INSTRUMENTS[v2.instrument] ? v2.instrument : 'bass_recorder'
      if (instKey !== params2.instrument) {
        params2.instrument = instKey; pending2.instrument = instKey
        createSampler(2, instKey)
      }
    }
  }
}

// ─── postMessage protocol ─────────────────────────────────────────────────────
// Production: tighten origin to "https://butterflydreaming.info"
window.addEventListener('message', async (event) => {
  try {
    const msg = event.data
    if (!msg || !msg.type) return

    if (msg.type === 'BD_INIT') {
      const text = msg.payload?.text || ''
      const d = parseBD(text)
      applyDirectives(d)

      const ok = recompute()
      if (ok) {
        setStatus(samplerReady ? 'Ready — press Play' : 'Grammar loaded — samples loading…')
        // A3: push ABC to harness immediately so debug display populates on Send to Player
        const combinedABC = currentABC2 ? currentABC + '\n\n' + currentABC2 : currentABC
        window.parent.postMessage({ type: 'BD_UPDATE', payload: { text: buildNodeText(), generatedABC: combinedABC } }, '*')
      }

    } else if (msg.type === 'BD_REQUEST_UPDATE') {
      const text = buildNodeText()
      // generatedABC is a debug field — not written back into node text (A2 Part A)
      const combinedABC2 = currentABC2 ? currentABC + '\n\n' + currentABC2 : currentABC
      window.parent.postMessage({ type: 'BD_UPDATE', payload: { text, generatedABC: combinedABC2 } }, '*')

    } else if (msg.type === 'BD_STOP') {
      stopPlay()
    }
  } catch (e) {
    postError('Message handler error: ' + e.message)
  }
})

// ─── UI event listeners ───────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', async () => {
  if (isPlaying) stopPlay()
  await startPlay()
})

document.getElementById('stop-btn').addEventListener('click', stopPlay)

document.getElementById('copy-btn').addEventListener('click', () => {
  if (!currentABC) return
  const toCopy = currentABC2 ? currentABC + '\n\n' + currentABC2 : currentABC
  navigator.clipboard.writeText(toCopy).then(() => {
    const btn = document.getElementById('copy-btn')
    btn.textContent = 'Copied!'
    setTimeout(() => { btn.textContent = 'Copy Music' }, 1500)
  }).catch(() => {
    postError('Clipboard write failed')
  })
})

// Grammar/playback controls — changes registered in pending, applied at loop boundary
document.getElementById('depth-sel').addEventListener('change', (e) => {
  pending.depth = parseInt(e.target.value)
  paramsChanged = true
})

document.getElementById('scale-sel').addEventListener('change', (e) => {
  pending.scale = e.target.value
  paramsChanged = true
})

document.getElementById('tempo-slider').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value)
  pending.tempo = v
  document.getElementById('tempo-val').textContent = Math.round(v) + ' BPM'
  paramsChanged = true
})

document.getElementById('axiom-input').addEventListener('input', (e) => {
  pending.axiom = e.target.value.trim()
  paramsChanged = true
})

document.getElementById('rules-area').addEventListener('input', (e) => {
  pending.rules = parseRules(e.target.value)
  paramsChanged = true
})

document.getElementById('axiom-input-2').addEventListener('input', (e) => {
  pending2.axiom = e.target.value.trim()
  hasVoice2 = pending2.axiom !== ''
  paramsChanged = true
})

document.getElementById('rules-area-2').addEventListener('input', (e) => {
  pending2.rules = parseRules(e.target.value)
  paramsChanged = true
})

// Audio effect sliders
function wireSlider(id, valId, paramKey, fmt) {
  document.getElementById(id).addEventListener('input', (e) => {
    const v = parseFloat(e.target.value)
    pending[paramKey] = v
    document.getElementById(valId).textContent = fmt(v)
    paramsChanged = true
  })
}

wireSlider('reverb-wet',   'reverb-wet-val',   'reverbWet',   v => v.toFixed(2))
wireSlider('reverb-decay', 'reverb-decay-val', 'reverbDecay', v => v.toFixed(1) + 's')
wireSlider('vibrato-freq', 'vibrato-freq-val', 'vibratoFreq', v => v.toFixed(1) + ' Hz')
wireSlider('vibrato-depth','vibrato-depth-val','vibratoDepth',v => v.toFixed(2))
wireSlider('chorus-wet',   'chorus-wet-val',   'chorusWet',   v => v.toFixed(2))
wireSlider('chorus-depth', 'chorus-depth-val', 'chorusDepth', v => v.toFixed(2))

// ─── Init ─────────────────────────────────────────────────────────────────────
// Post BD_READY immediately — samples still loading but module is in DOM
window.parent.postMessage({ type: 'BD_READY' }, '*')
setStatus('Loading samples…')
createSampler(1, 'bass_recorder')
createSampler(2, 'bass_recorder')
</script>
